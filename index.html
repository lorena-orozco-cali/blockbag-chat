<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlockBag - Asistente Virtual</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: #1a1208; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
  .chat-container { width: 100%; max-width: 420px; background: #1e1610; border-radius: 24px; overflow: hidden; box-shadow: 0 32px 80px rgba(0,0,0,0.6); border: 1px solid #3a2e1e; }
  .chat-header { background: linear-gradient(135deg, #2a1f0e, #3d2d12); padding: 18px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #3a2e1e; }
  .avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #c9a84c, #8b6914); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .header-info h3 { font-family: 'Playfair Display', serif; color: #e8d5a3; font-size: 15px; font-weight: 600; }
  .online { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #7ecf7e; margin-top: 2px; }
  .online-dot { width: 6px; height: 6px; background: #7ecf7e; border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .messages { height: 420px; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 12px; scrollbar-width: none; }
  .messages::-webkit-scrollbar { display: none; }
  .msg { display: flex; flex-direction: column; gap: 4px; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .msg.bot { align-items: flex-start; }
  .msg.user { align-items: flex-end; }
  .bubble { max-width: 85%; padding: 11px 14px; border-radius: 16px; font-size: 13.5px; line-height: 1.5; }
  .msg.bot .bubble { background: #2e2214; color: #e8d5a3; border-bottom-left-radius: 4px; border: 1px solid #3a2e1e; }
  .msg.user .bubble { background: linear-gradient(135deg, #c9a84c, #a07820); color: #1a1208; border-bottom-right-radius: 4px; font-weight: 500; }
  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 4px; }
  .opt-btn { background: #2e2214; border: 1px solid #c9a84c44; border-radius: 12px; padding: 10px 8px; color: #e8d5a3; font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; transition: all 0.2s; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .opt-btn:hover { background: #3d2d12; border-color: #c9a84c; transform: translateY(-1px); }
  .opt-btn span { font-size: 18px; }
  .input-area { padding: 14px 16px; background: #2a1f0e; border-top: 1px solid #3a2e1e; display: flex; gap: 10px; align-items: center; }
  .input-area input { flex: 1; background: #1e1610; border: 1px solid #3a2e1e; border-radius: 20px; padding: 10px 16px; color: #e8d5a3; font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; }
  .input-area input::placeholder { color: #5a4a30; }
  .input-area input:focus { border-color: #c9a84c55; }
  .send-btn { width: 38px; height: 38px; background: linear-gradient(135deg, #c9a84c, #a07820); border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: transform 0.15s; }
  .send-btn:hover { transform: scale(1.05); }
  .typing { display: flex; gap: 4px; align-items: center; padding: 11px 14px; background: #2e2214; border-radius: 16px; border-bottom-left-radius: 4px; border: 1px solid #3a2e1e; width: fit-content; }
  .typing span { width: 6px; height: 6px; background: #c9a84c; border-radius: 50%; animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
</style>
</head>
<body>
<div class="chat-container">
  <div class="chat-header">
    <div class="avatar">🧳</div>
    <div class="header-info">
      <h3>BlockBag Asistente</h3>
      <div class="online"><div class="online-dot"></div>En línea ahora</div>
    </div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <input type="text" id="userInput" placeholder="O escribe tu pregunta directo..." onkeydown="if(event.key==='Enter')sendMsg()">
    <button class="send-btn" onclick="sendMsg()">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path d="M22 2L11 13M22 2L15 22 11 13 2 9l20-7z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>
</div>
<script>
const CONOCIMIENTO = `Eres el asistente virtual de BlockBag, empresa colombiana fabricante de forros protectores para maletas de viaje, con sede en Cali, Colombia. Responde siempre en español, de forma amable, cálida y concisa. Máximo 3-4 líneas por respuesta. Cuando el cliente quiera hablar con un asesor, dile que en breve un asesor lo contactará y pídele su nombre y número de contacto.\n\nINFORMACIÓN REAL DE BLOCKBAG:\n- Producto principal: Forros protectores para maletas de viaje\n- Fabricación: 100% colombiana, insumos y mano de obra nacional\n- Calidad: Alta calidad, telas resistentes e impermeables\n- Característica especial: Arandelas de seguridad con candado BlockBag para proteger contra robo\n- Variedad: Gran variedad de estampados y diseños\n- Tallas: Se adaptan a maletas pequeñas (cabina), medianas y grandes\n- Materiales: Telas de alta tecnología, resistentes y durables\n- Envíos: Envíos nacionales a todo Colombia\n- Instagram: @blockbagcali\n- Por mayor: Para empresas que quieran forros con logo corporativo, contactar asesor\n- Garantía: Productos de alta calidad con respaldo de la marca\n- Precios: El cliente debe preguntar al asesor o visitar blockbag.co\n\nSi no sabes algo específico, pide nombre y WhatsApp para que un asesor lo contacte.`;

const conversacion = [
  { role: "user", content: CONOCIMIENTO },
  { role: "assistant", content: "Entendido, estoy listo para asesorar a los clientes de BlockBag." }
];

const MENU = [
  { icon: "📐", label: "Tallas disponibles" },
  { icon: "🎨", label: "Estampados y colores" },
  { icon: "🛡️", label: "Materiales y calidad" },
  { icon: "💰", label: "Precios" },
  { icon: "📦", label: "Envíos" },
  { icon: "💳", label: "Formas de pago" },
  { icon: "🏭", label: "Por mayor / Empresas" },
  { icon: "👤", label: "Hablar con asesor" }
];

function addMsg(role, content, isMenu) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  if (isMenu) {
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = content;
    div.appendChild(bubble);
    const grid = document.createElement('div');
    grid.className = 'options-grid';
    MENU.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'opt-btn';
      btn.innerHTML = `<span>${opt.icon}</span>${opt.label}`;
      btn.onclick = () => handleOption(opt.label);
      grid.appendChild(btn);
    });
    div.appendChild(grid);
  } else {
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = content.replace(/\n/g, '<br>');
    div.appendChild(bubble);
  }
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing';
  div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function askAI(mensaje) {
  conversacion.push({ role: "user", content: mensaje });
  showTyping();
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, messages: conversacion })
    });
    const data = await res.json();
    const respuesta = data.content?.[0]?.text || "Disculpa, hubo un error.";
    conversacion.push({ role: "assistant", content: respuesta });
    removeTyping();
    addMsg('bot', respuesta);
  } catch(e) {
    removeTyping();
    addMsg('bot', "Disculpa, en este momento no puedo responder. Escríbenos al WhatsApp de BlockBag. 💛");
  }
}

function handleOption(opcion) { addMsg('user', opcion); askAI(opcion); }
function sendMsg() {
  const input = document.getElementById('userInput');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  addMsg('user', msg);
  askAI(msg);
}

setTimeout(() => {
  addMsg('bot', '¡Hola! 👋 Bienvenido a BlockBag, fabricantes de los mejores forros protectores para maletas de viaje en Colombia. ¿En qué te puedo ayudar hoy?', true);
}, 500);
</script>
</body>
</html>
